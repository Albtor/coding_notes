<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo classes 1</title>
    <link rel="stylesheet" type="text/css" href="styles1.css">
</head>
<body>
    <h1>Pseudo classes</h1>
    <div>
        <label for="name">My name is - hover</label>
        <input type="text" class="name" id="name">
    </div>
    <div>
        <label for="surname">Surmane - required</label>
        <input type="text" class="surname" id="surname" required>
    </div>
    <div>
        <label for="email">Email - disabled</label>
        <input type="email" class="email"  id="email" disabled>
    </div>
    
    
    <button type="submit" class="submit">Send - hover/focus</button>

    <p>xxxx:hover</p>
    <p>xxxx:active</p>
    <p>xxxx:disabled</p>
    <p>xxxx:focus</p>
    <p>xxxx:required</p>

    
</body>
</html>
