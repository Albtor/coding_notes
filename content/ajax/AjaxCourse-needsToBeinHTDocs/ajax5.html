<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax 5 - PHP Forms</title>
</head>
<body>
    <button id="button">Get Name</button>

    <h2>POST FORM</h2>
    <form action="process.php" method="POST">
        <input type="text" name="name">
        <input type="submit" value="Submit">
    </form>

    <h2>AJAX POST FORM</h2>
    <form id="postForm">
        <input type="text" name="name" id="name2">
        <input type="submit" value="Submit">
    </form>

    <script>
        document.getElementById('button').addEventListener('click', getName);
        document.getElementById('postForm').addEventListener('submit', getName2);

        function getName(){
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'process.php?name=Brad', true);

            xhr.onload = function(){
                console.log(this.responseText);
            }
        xhr.send();

        }
        function getName2(e){
            e.preventDefault();

            var name = document.getElementById('name2').value;
            var params = "name= "+name;

            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'process.php', true); //With post we can't attach the parameter like with GET
            xhr.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');

            xhr.onload = function(){
                console.log(this.responseText);
            }
        xhr.send(params);
        }
    </script>
</body>
</html>
